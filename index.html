<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTURED BY KOHL | PORTFOLIO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root { 
            --bg: #050505; 
            --tiger: #ff6600; 
            --white: #ffffff;
            --border: rgba(255, 102, 0, 0.1); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: var(--bg); color: var(--white); font-family: 'Outfit', sans-serif; overflow-x: hidden; }

        /* --- Custom Cursor --- */
        #cursor { 
            width: 12px; height: 12px; background: var(--white); border-radius: 50%; 
            position: fixed; pointer-events: none; z-index: 10001; mix-blend-mode: difference;
        }

        /* --- Progress & Navigation --- */
        #progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--tiger); width: 0%; z-index: 10002; }
        
        nav {
            position: fixed; top: 0; width: 100%; padding: 30px; display: flex;
            justify-content: space-between; z-index: 1000; font-family: 'Syncopate'; font-size: 10px;
            letter-spacing: 5px; mix-blend-mode: difference;
        }

        /* --- Hero Section --- */
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .hero h1 { 
            font-family: 'Syncopate'; font-size: clamp(4rem, 22vw, 18rem); 
            line-height: 0.7; letter-spacing: -15px; text-transform: uppercase;
        }
        .hero h1 span { display: block; -webkit-text-stroke: 1px var(--white); color: transparent; }
        .hero-tag { color: var(--tiger); letter-spacing: 20px; font-weight: 900; font-size: 10px; margin-bottom: 20px; opacity: 0.5; }

        /* --- Gallery Section --- */
        .gallery-container { padding: 0 2vw 100px; }
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; }

        .card { 
            grid-column: span 4; position: relative; height: 75vh; 
            overflow: hidden; background: #000; border: 1px solid var(--border);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }
        .card.wide { grid-column: span 8; }
        .card img { 
            width: 100%; height: 120%; object-fit: cover; 
            filter: grayscale(100%) brightness(0.3); transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .card:hover img { filter: grayscale(0%) brightness(0.8); transform: scale(1.05); }

        /* --- Media HUD --- */
        .hud { 
            position: absolute; inset: 0; display: flex; align-items: center; 
            justify-content: center; opacity: 0; transition: 0.5s;
        }
        .card:hover .hud { opacity: 1; }
        .hud-btn { 
            background: transparent; color: #fff; border: 1px solid #fff; 
            padding: 20px 40px; font-weight: 900; font-size: 10px; 
            letter-spacing: 5px; backdrop-filter: blur(5px);
        }

        /* --- Contact Dock --- */
        .contact-dock {
            position: fixed; bottom: 40px; right: 40px; z-index: 5000;
            display: flex; flex-direction: column; align-items: flex-end; gap: 15px;
        }
        .dock-item {
            font-family: 'Syncopate'; font-size: 9px; color: var(--white);
            text-decoration: none; padding: 10px 20px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.8); transition: 0.3s; letter-spacing: 2px;
        }
        .dock-item:hover { background: var(--tiger); color: #000; border-color: var(--tiger); }

        /* --- Hidden Admin --- */
        #admin-panel {
            position: fixed; left: -400px; top: 0; width: 350px; height: 100vh;
            background: #000; border-right: 1px solid var(--tiger); z-index: 9999;
            padding: 40px; transition: 0.5s ease;
        }
        #admin-panel.open { left: 0; }
        .admin-input { width: 100%; background: #111; border: 1px solid #222; padding: 15px; color: var(--tiger); margin: 20px 0; }

        @media (max-width: 900px) { .card { grid-column: span 12 !important; height: 50vh !important; } }
    </style>
</head>
<body>

    <div id="progress"></div>
    <div id="cursor"></div>

    <nav>
        <div>SYSTEM // 2026</div>
        <div style="color: var(--tiger);">CAPTURED BY KOHL</div>
    </nav>

    <div id="admin-panel">
        <h2 style="font-family: 'Syncopate'; font-size: 12px; color: var(--tiger);">DATALINK</h2>
        <textarea id="id-input" class="admin-input" rows="10" placeholder="IMGUR_IDS_HERE"></textarea>
        <button onclick="saveGallery()" style="width:100%; padding:15px; background:var(--tiger); border:none; font-weight:900;">PUSH UPDATE</button>
    </div>

    <section class="hero">
        <div class="hero-tag">MASSILLON / PHOTOGRAPHY </div>
        <h1>KAYDEN<span>KOHL</span></h1>
    </section>

    <div class="gallery-container">
        <main class="grid" id="main-grid"></main>
    </div>

    <div class="contact-dock">
        <a href="tel:3303231495" class="dock-item" onmouseover="playHover()">330.323.1495</a>
        <a href="mailto:framedbykohl@gmail.com" class="dock-item" onmouseover="playHover()">FRAMEDBYKOHL@GMAIL.COM</a>
        <a href="https://instagram.com/capturedbykohl" target="_blank" class="dock-item" onmouseover="playHover()">@CAPTUREDBYKOHL</a>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        const hoverSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'); // Light click
        const clickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'); // Mechanical Shutter
        hoverSound.volume = 0.2;
        clickSound.volume = 0.5;

        function playHover() { hoverSound.currentTime = 0; hoverSound.play(); }
        function playClick() { clickSound.currentTime = 0; clickSound.play(); }

        // --- DATA ENGINE ---
        const baseIDs = ['OqzVh2F', '2EU5WgG', 'OlaYTOm', 'BdDiI73', 'nTI0UpG', 'l8KtKwq', 'XqUUO8H', 'IpBX3PV', '1JT7O0L', 'jiDUMAV', 'kR797z7', 'n1xbiVG', 'Wy06l2G', 'u4VKTTW', 'VbnLz6J', 'C2vnNeA', 'FZQaapc', 'dGx0YcH', 'XYdhz7D', 'Za82bCB', 'tePEZC8', 'X0cxaz9', 'PHBCWBL', 'P9ugqSs', 'stsJb5o', 'ifpMQG3', '9m4qjNO'];
        let activeIDs = JSON.parse(localStorage.getItem('specter_cache')) || baseIDs;

        function buildGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            activeIDs.forEach((id, i) => {
                const card = document.createElement('div');
                const url = `https://i.imgur.com/${id.trim()}.jpeg`;
                card.className = `card ${i % 7 === 0 ? 'wide' : ''}`;
                card.innerHTML = `<img src="${url}" onmouseover="playHover()"><div class="hud"><button class="hud-btn" onclick="playClick(); window.open('${url}','_blank')">OPEN_FILE</button></div>`;
                grid.appendChild(card);
            });
            initParallax();
        }

        // --- INTERFACE ---
        window.addEventListener('keydown', e => { if(e.key.toLowerCase() === 'l') document.getElementById('admin-panel').classList.toggle('open'); });
        
        function saveGallery() {
            const val = document.getElementById('id-input').value;
            if(val) {
                activeIDs = [...val.split(','), ...activeIDs];
                localStorage.setItem('specter_cache', JSON.stringify(activeIDs));
                buildGrid();
                playClick();
            }
        }

        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });

        window.addEventListener('scroll', () => {
            const scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            document.getElementById("progress").style.width = scrolled + "%";
        });

        gsap.registerPlugin(ScrollTrigger);
        function initParallax() {
            document.querySelectorAll('.card img').forEach(img => {
                gsap.to(img, { y: '15%', scrollTrigger: { trigger: img.parentElement, scrub: 0.5 } });
            });
        }

        // Silent Errors
        window.onerror = () => true;

        buildGrid();
    </script>
</body>
</html>
